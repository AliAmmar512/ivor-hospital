version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ivor_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: [
        "CMD", "/opt/mssql-tools18/bin/sqlcmd",
        "-S", "localhost",
        "-U", "sa",
        "-P", "${SA_PASSWORD}",
        "-No", "-Q", "SELECT 1 FROM sys.databases WHERE name='IvorHospital'"
      ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ivor_hospital_ddl.sql:/docker-entrypoint-initdb.d/init.sql
      - ./init-db.sh:/init-db.sh
    entrypoint: ["/bin/bash", "/init-db.sh"]
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}

  web:
    build: .
    container_name: ivor_php
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}

volumes:
  sqldata: